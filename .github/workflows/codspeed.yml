name: CodSpeed

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: npm run bench:codspeed
